<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
    {{- partial "head.html" . -}}
</head>
<body class="font-mono min-h-screen scanline" style="background-color: var(--term-bg); color: var(--term-secondary);">
    <div class="noise-overlay"></div>

    <div class="max-w-4xl mx-auto px-6 py-12 relative z-10">
        {{- partial "header.html" . -}}

        <main>
            {{- block "main" . }}{{- end }}
        </main>

        {{- partial "footer.html" . -}}
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        // Wrap code blocks with copy button and language label
        document.querySelectorAll('.prose pre').forEach(function(pre) {
            var wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);

            // Detect language from code element class
            var code = pre.querySelector('code');
            if (code) {
                var cls = Array.from(code.classList).find(function(c) { return c.startsWith('language-'); });
                if (cls) {
                    var lang = document.createElement('span');
                    lang.className = 'code-lang';
                    lang.textContent = cls.replace('language-', '');
                    wrapper.appendChild(lang);
                }
            }

            // Copy button
            var btn = document.createElement('button');
            btn.className = 'code-copy';
            btn.textContent = 'COPY';
            btn.addEventListener('click', function() {
                var text = pre.textContent;
                navigator.clipboard.writeText(text).then(function() {
                    btn.textContent = 'COPIED';
                    setTimeout(function() { btn.textContent = 'COPY'; }, 2000);
                });
            });
            wrapper.appendChild(btn);
        });
    </script>
</body>
</html>
